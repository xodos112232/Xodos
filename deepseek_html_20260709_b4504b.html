<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تقديم Whitelist - Last Hope</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0A0A0A; color: #fff; font-family: 'Inter', sans-serif; padding: 40px; }
        .container { max-width: 700px; margin: auto; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid #FF2A75; }
        h1 { font-family: 'Orbitron', sans-serif; color: #00E5FF; text-align: center; }
        label { display: block; margin: 20px 0 5px; color: #aaa; font-weight: bold; }
        input, textarea, select {
            width: 100%; padding: 12px; background: #1A1A1A; border: 1px solid #333; border-radius: 10px;
            color: #fff; font-size: 1rem; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #FF2A75; outline: none; box-shadow: 0 0 20px rgba(255,42,117,0.2); }
        textarea { height: 150px; resize: vertical; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .checkbox-group input { width: auto; }
        .btn-submit {
            width: 100%; padding: 15px; background: #FF2A75; border: none; border-radius: 50px;
            color: #fff; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 30px rgba(255,42,117,0.3);
        }
        .btn-submit:hover { background: #00E5FF; color: #000; box-shadow: 0 0 40px #00E5FF; }
        .success-msg { background: #00E5FF; color: #000; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; }
        .back-link a { color: #FF2A75; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-user-plus"></i> التقديم للعب (Whitelist)</h1>
        <p style="text-align: center; color: #aaa;">أكمل البيانات بدقة ليتم مراجعة طلبك من قبل الإدارة</p>

        {% if success %}
        <div class="success-msg">
            <i class="fas fa-check-circle"></i> تم تقديم طلبك بنجاح! ستصلك رسالة بالقبول أو الرفض قريباً.
        </div>
        {% endif %}

        <form method="POST">
            <label for="character_name"><i class="fas fa-user"></i> اسم الشخصية في اللعبة</label>
            <input type="text" id="character_name" name="character_name" placeholder="مثال: Tony Montana" required>

            <label for="backstory"><i class="fas fa-book"></i> الخلفية الدرامية (Backstory)</label>
            <textarea id="backstory" name="backstory" placeholder="اكتب قصة شخصيتك، ماضيه، طموحاته... (الحد الأدنى 200 حرف)" required minlength="200"></textarea>

            <div class="checkbox-group">
                <input type="checkbox" id="agree" required>
                <label for="agree" style="margin:0; color:#aaa;">أوافق على <a href="#" style="color:#00E5FF;">قوانين السيرفر</a> وأتعهد بالالتزام بها.</label>
            </div>

            <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> إرسال الطلب</button>
        </form>
        <div class="back-link">
            <a href="/dashboard"><i class="fas fa-arrow-left"></i> العودة للوحة التحكم</a>
        </div>
    </div>
</body>
</html>
